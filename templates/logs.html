{% extends 'base.html' %}{% block content %}<h1 class="text-3xl font-semibold mb-6">Developer activity log</h1><div class="grid gap-3">{% for log in logs %}<details class="p-4 rounded-xl bg-slate-900 text-white"><summary>{{ log.created_at.strftime('%Y-%m-%d %H:%M') }} · {{ log.action }} · {{ log.detail }}</summary>{% if log.payload %}<pre class="mt-3 text-xs whitespace-pre-wrap overflow-auto">{{ log.payload }}</pre>{% endif %}</details>{% endfor %}</div>{% endblock %}
