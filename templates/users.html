{% extends 'base.html' %}{% block content %}<h1 class="text-3xl font-semibold mb-6">Users</h1><form method="post" class="grid gap-3 max-w-xl p-5 bg-slate-900 rounded-2xl text-white"><input required name="email" type="email" placeholder="Email" class="p-3 bg-slate-800 rounded"><input required name="password" type="password" placeholder="Temporary password (12+ characters)" class="p-3 bg-slate-800 rounded"><select name="role" class="p-3 bg-slate-800 rounded"><option value="user">User</option><option value="admin">Administrator</option></select><button class="bg-cyan-400 text-slate-950 font-bold p-3 rounded">Add user</button></form><div class="mt-6">{% for user in users %}<p class="p-3 border-b">{{ user.email }} · {{ user.role }}</p>{% endfor %}</div>{% endblock %}
