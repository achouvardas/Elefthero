{% extends 'base.html' %}{% block content %}<h1 class="text-3xl font-semibold mb-6">Users</h1><form method="post" class="grid gap-3 max-w-xl p-5 bg-slate-900 rounded-2xl text-white"><input required name="email" type="email" placeholder="Email" class="p-3 bg-slate-800 rounded"><input required name="password" type="password" placeholder="Temporary password (12+ characters)" class="p-3 bg-slate-800 rounded"><select name="role" class="p-3 bg-slate-800 rounded"><option value="user">User</option><option value="admin">Administrator</option></select><button class="bg-cyan-400 text-slate-950 font-bold p-3 rounded">Add user</button></form><div class="mt-6 rounded-2xl bg-slate-900 overflow-hidden">{% for user in users %}<div class="p-4 border-b border-slate-700 flex justify-between items-center"><p>{{ user.email }} · {{ user.role }}</p>{% if current_user.id != user.id %}<form method="post" action="{{ url_for('delete_user', user_id=user.id) }}" onsubmit="return confirm('Delete this user?')"><button class="text-rose-500 border border-rose-500/50 rounded-lg px-3 py-2 text-sm">Delete</button></form>{% endif %}</div>{% endfor %}</div>{% endblock %}
